<!DOCTYPE html>
<html lang="es">
<head>

<!-- PWA y Responsive -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#3498db">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo.png">

  <link rel="icon" type="image/png" sizes="192x192" href="logo.png">
  <link rel="icon" type="image/png" sizes="512x512" href="logo-512.png">
  
  <!-- iOS Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Control Horario">


  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Registros Horarios</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: url('fondo.png') repeat;
      background-size: 300px;
      background-color: #f5f5f5;
      padding: 20px;
      min-height: 100vh;
    }

    .main-content {
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }

    /* Logo */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      width: 100%;
      max-width: 300 px;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.15);
      margin: 0 auto 40px;
      display: block;
    }

    #logo.fallback {
      background: #2c3e50;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: bold;
      border-radius: 16px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.15);
      margin: 0 auto 40px;
    }

    /* Efecto al pasar el ratón */
    .logo:hover {
      transform: scale(1.03) translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1, h2 {
      color: #2c3e50;
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      background: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #2980b9;
      transform: translateY(-2px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #f2f2f2;
      color: #2c3e50;
    }

    #mensaje {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }

    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }

    #registros-container {
      margin-top: 20px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 20px;
      }
      input, button {
        padding: 10px;
        font-size: 14px;
      }
    }
  </style>

<!-- ✅ Sistema de actualización automática -->
<script>
  // Añadir timestamp a todas las URLs de scripts y estilos
  document.addEventListener('DOMContentLoaded', () => {
    const timestamp = Date.now();
    
    // Actualizar scripts
    document.querySelectorAll('script[src]').forEach(script => {
      if (!script.src.includes('?v=')) {
        script.src = script.src + '?v=' + timestamp;
      }
    });
    
    // Actualizar estilos (si tienes CSS externos)
    document.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
      if (!link.href.includes('?v=')) {
        link.href = link.href + '?v=' + timestamp;
      }
    });
  });
</script>

</head>
<body>
  <div class="main-content">

  <!-- Logo (clic para volver a inicio) -->
   <div class="header">
    <a href="index.html">
     <img src="logo.png" alt="Logo de la Empresa" class="logo" id="logo">
    </a>
   </div>

    <div class="container">
      <h2>📋 Mis Registros Horarios</h2>
      
      <div id="formulario">
        <input type="number" id="pin-usuario" placeholder="Introduce tu PIN (4 dígitos)" min="1000" max="9999" />
        <button id="ver-registros">🔍 Ver mis registros</button>
        <div id="mensaje"></div>
      </div>

      <div id="registros-container" style="display: none;">
        <h3>Tus últimos 20 registros</h3>
        <table id="tabla-registros">
          <thead>
            <tr>
              <th>Tipo</th>
              <th>Fecha y Hora</th>
              <th>Comentario</th> <!-- ✅ NUEVA COLUMNA -->
            </tr>
          </thead>
          <tbody id="cuerpo-registros"></tbody>
        </table>
        <button id="volver" style="margin-top: 15px; background: #e74c3c;">⬅️ Volver</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
    apiKey: "AIzaSyAhp3v6jwxN8nrachWt3m879Ir8_midnbs",
    authDomain: "gen-lang-client-0317267897.firebaseapp.com",
    projectId: "gen-lang-client-0317267897",
    storageBucket: "gen-lang-client-0317267897.firebasestorage.app",
    messagingSenderId: "952141780593",
    appId: "1:952141780593:web:72c0f7aada03741958edd0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let TRABAJADORES = {};

    // Cargar lista de trabajadores
    async function cargarTrabajadores() {
      try {
        const snapshot = await db.collection('trabajadores').get();
        const mapa = {};
        snapshot.forEach(doc => {
          const data = doc.data();
          if (data.pin && data.nombre) {
            mapa[data.pin] = data.nombre;
          }
        });
        TRABAJADORES = mapa;
      } catch (err) {
        console.error("Error al cargar trabajadores:", err);
      }
    }

    // Formatear fecha
    function formatearFecha(fecha) {
      if (fecha?.toDate) fecha = fecha.toDate();
      return new Intl.DateTimeFormat('es-ES', {
        year: '2-digit',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      }).format(fecha);
    }

    // Mostrar mensaje
    function mostrarMensaje(texto, tipo = 'success') {
      const msg = document.getElementById('mensaje');
      msg.textContent = texto;
      msg.className = tipo;
    }

    // Cargar registros del usuario
    async function cargarRegistrosUsuario(pin) {
      if (!TRABAJADORES[pin]) {
        mostrarMensaje('⚠️ PIN no válido', 'error');
        return;
      }

      try {
        const snapshot = await db.collection('registros_publicos')
          .where('trabajadorId', '==', pin)
          .orderBy('fechaHora', 'desc')
          .limit(20)
          .get();

        const tbody = document.getElementById('cuerpo-registros');
        if (snapshot.empty) {
          tbody.innerHTML = '<tr><td colspan="3">No hay registros disponibles</td></tr>';
        } else {
          const filas = [];
          snapshot.forEach(doc => {
            const r = doc.data();
            const comentario = r.comentario || '-'; // ✅ Mostrar comentario o guion
            filas.push(`
              <tr>
                <td>${r.tipo}</td>
                <td>${formatearFecha(r.fechaHora)}</td>
                <td>${comentario}</td>
              </tr>
            `.trim());
          });
          tbody.innerHTML = filas.join('');
        }

        // Mostrar contenedor de registros
        document.getElementById('registros-container').style.display = 'block';
        document.getElementById('formulario').style.display = 'none';
        
      } catch (err) {
        console.error("Error al cargar registros:", err);
        mostrarMensaje('❌ Error al cargar registros', 'error');
      }
    }

    // Eventos
    document.getElementById('ver-registros').addEventListener('click', () => {
      const pinInput = document.getElementById('pin-usuario');
      const pin = pinInput.value.trim();
      
      if (!pin || pin.length !== 4 || isNaN(pin)) {
        mostrarMensaje('⚠️ Introduce un PIN válido de 4 dígitos', 'error');
        return;
      }
      
      cargarRegistrosUsuario(pin);
    });

    document.getElementById('volver').addEventListener('click', () => {
      document.getElementById('registros-container').style.display = 'none';
      document.getElementById('formulario').style.display = 'block';
      document.getElementById('pin-usuario').value = '';
      document.getElementById('mensaje').textContent = '';
    });

    // Inicializar
    cargarTrabajadores();

    // Fallback para logo
    document.getElementById('logo').onerror = function() {
      this.classList.add('fallback');
      this.textContent = 'LC';
    };
  </script>
</body>
</html>
