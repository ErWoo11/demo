/* ✅ Estilos para geolocalización */

  font-size: 14px;

  border-left: 4px solid #3498db;
}

#ubicacion-mensaje.verificado {
  color: #27ae60;
  font-weight: bold;
}

#ubicacion-mensaje.error {
  color: #e74c3c;
  font-weight: bold;
}

#btn-verificar-ubicacion {
  background: #3498db !important;
  font-size: 14px;
  padding: 10px;
}

#btn-verificar-ubicacion:disabled {
  background: #bdc3c7 !important;
  cursor: not-allowed;

<!-- ✅ Sistema de actualización automática -->
<script>
  // Añadir timestamp a todas las URLs de scripts y estilos
  document.addEventListener('DOMContentLoaded', () => {
    const timestamp = Date.now();
    
    // Actualizar scripts
    document.querySelectorAll('script[src]').forEach(script => {
      if (!script.src.includes('?v=')) {
        script.src = script.src + '?v=' + timestamp;
      }
    });
    
    // Actualizar estilos (si tienes CSS externos)
    document.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
      if (!link.href.includes('?v=')) {
        link.href = link.href + '?v=' + timestamp;
      }
    });
  });
</script>

</head>
<body>
  <div class="main-content">
    <!-- Logo -->
    <div class="header">
      <img src="logo.png" alt="Logo de la Empresa" class="logo" id="logo">
    </div>

    <!-- Contenido -->
    <div class="container">
      <h2>Registro de Jornada</h2>

<!-- ✅ Información de la obra y geolocalización -->
<div id="info-obra" style="display:none; margin-bottom: 15px; padding: 10px; background: #e8f4f8; border-radius: 8px; text-align: left;">
  <strong>🏗️ Obra:</strong> <span id="obra-nombre">Cargando...</span><br>
  <strong>📍 Estado:</strong> <span id="ubicacion-mensaje">Verificando ubicación...</span>
</div>

<!-- ✅ Botón de verificación manual (opcional, por si falla la automática) -->
<button id="btn-verificar-ubicacion" style="display:none; background: #3498db; margin-bottom: 15px;">
  🔄 Verificar ubicación manualmente
</button>

      <div id="cargando">Cargando lista de trabajadores...</div>
      <div id="formulario" style="display:none;">
        <label for="pin">Introduce tu PIN (4 dígitos):</label>
        <input type="number" id="pin" placeholder="Ej: 1234" min="1000" max="9999" />

        <button id="entrada">✅ Registrar ENTRADA</button>
        <button id="salida">🚪 Registrar SALIDA</button>

        <div id="contador-bloqueo">
          ⏳ Próxima entrada disponible en: <span id="minutos-restantes">60</span> minutos
        </div>
      </div>

      <div id="mensaje"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
    apiKey: "AIzaSyAhp3v6jwxN8nrachWt3m879Ir8_midnbs",
    authDomain: "gen-lang-client-0317267897.firebaseapp.com",
    projectId: "gen-lang-client-0317267897",
    storageBucket: "gen-lang-client-0317267897.firebasestorage.app",
    messagingSenderId: "952141780593",
    appId: "1:952141780593:web:72c0f7aada03741958edd0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Obtener PIN de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const pinFromUrl = urlParams.get('pin');

    // Verificar PIN de acceso
    async function verificarPINAcceso() {
      if (!pinFromUrl) {
        mostrarErrorAcceso();
        return false;
      }

      try {
        const doc = await db.collection('pines_acceso').doc(pinFromUrl).get();
        if (!doc.exists || !doc.data().activo) {
          mostrarErrorAcceso();
          return false;
        }
        return true;
      } catch (err) {
        console.error("Error verificando PIN:", err);
        mostrarErrorAcceso();
        return false;
      }
    }

    function mostrarErrorAcceso() {
      document.body.innerHTML = `
        <div style="text-align:center; padding:50px; font-family:Arial; background:#f8d7da; color:#721c24;">
          <h2>❌ Acceso no autorizado</h2>
          <p>Este sistema solo funciona desde el puesto de trabajo.</p>
          <p>Escanea el código QR oficial.</p>
        </div>
      `;
    }

    let TRABAJADORES = {};

    function mostrarMensaje(texto, tipo = 'success') {
      const msg = document.getElementById('mensaje');
      msg.textContent = texto;
      msg.className = tipo;
    }

    async function cargarTrabajadores() {
      try {
        const snapshot = await db.collection('trabajadores').get();
        if (snapshot.empty) {
          document.getElementById('cargando').textContent = '⚠️ No hay trabajadores registrados.';
          return;
        }
        const mapa = {};
        snapshot.forEach(doc => {
          const data = doc.data();
          if (data.pin && data.nombre) {
            mapa[data.pin] = data.nombre;
          }
        });
        TRABAJADORES = mapa;
        document.getElementById('cargando').style.display = 'none';
        document.getElementById('formulario').style.display = 'block';
        actualizarEstadoBotones();
      } catch (err) {
        console.error("Error al cargar trabajadores:", err);
        document.getElementById('cargando').textContent = '❌ Error al cargar. Revisa conexión.';
      }

// Mostrar sección de obra y verificar ubicación
document.getElementById('info-obra').style.display = 'block';
document.getElementById('btn-verificar-ubicacion').style.display = 'block';

// Verificación automática al cargar
verificarGeolocalizacion().then(esValida => {
  // Habilitar/deshabilitar botones según ubicación
  document.getElementById('entrada').disabled = !esValida;
  document.getElementById('salida').disabled = !esValida;
});

// Evento para verificación manual
document.getElementById('btn-verificar-ubicacion').addEventListener('click', async () => {
  const btn = document.getElementById('btn-verificar-ubicacion');
  btn.disabled = true;
  btn.textContent = '🔄 Verificando...';
  
  try {
    const esValida = await verificarGeolocalizacion();
    document.getElementById('entrada').disabled = !esValida;
    document.getElementById('salida').disabled = !esValida;
  } finally {
    btn.disabled = false;
    btn.textContent = '🔄 Verificar ubicación manualmente';
  }
});

    }

    async function obtenerUltimoTipo(pin) {
      const snapshot = await db.collection('registros_publicos')
        .where('trabajadorId', '==', pin)
        .orderBy('fechaHora', 'desc')
        .limit(1)
        .get();
      if (snapshot.empty) return null;
      return snapshot.docs[0].data().tipo;
    }

    function getEstadoDispositivo() {
      return JSON.parse(localStorage.getItem('control_horario_dispositivo') || '{}');
    }

    function setEstadoDispositivo(estado) {
      localStorage.setItem('control_horario_dispositivo', JSON.stringify(estado));
    }

    function limpiarBloqueo() {
      setEstadoDispositivo({});
      actualizarEstadoBotones();
    }

    function actualizarEstadoBotones() {
      const pinInput = document.getElementById('pin');
      const pin = pinInput.value.trim();
      const estado = getEstadoDispositivo();
      const ahora = Date.now();
      const unaHoraMs = 60 * 60 * 1000;

      const btnEntrada = document.getElementById('entrada');
      const btnSalida = document.getElementById('salida');
      const contadorDiv = document.getElementById('contador-bloqueo');
      const minutosSpan = document.getElementById('minutos-restantes');

      if (estado.pinEntrada && (ahora - estado.timestamp) < unaHoraMs) {
        contadorDiv.style.display = 'block';
        const minutosRestantes = Math.ceil((unaHoraMs - (ahora - estado.timestamp)) / 60000);
        minutosSpan.textContent = minutosRestantes;
        btnEntrada.disabled = true;
        if (pin === estado.pinEntrada) {
          btnSalida.disabled = false;
        } else {
          btnSalida.disabled = true;
        }
      } else {
        contadorDiv.style.display = 'none';
        btnEntrada.disabled = false;
        btnSalida.disabled = false;
      }
    }

    // ✅ FUNCIÓN PARA VERIFICAR Y RESET AUTOMÁTICO
    async function verificarYResetAutomatico() {
      if (!pinFromUrl) return;

      try {
        const pinDoc = await db.collection('pines_acceso').doc(pinFromUrl).get();
        if (!pinDoc.exists) return;

        const pinData = pinDoc.data();
        const resetHora = pinData.resetHora || '00:00';

        const statsRef = db.collection('estadisticas_pins').doc(pinFromUrl);
        const statsSnap = await statsRef.get();

        if (!statsSnap.exists) return;

        const statsData = statsSnap.data();
        const ultimaActualizacion = statsData.ultimaActualizacion?.toDate();
        if (!ultimaActualizacion) return;

        const ahora = new Date();
        const hoy = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate());
        const ayer = new Date(hoy.getTime() - 24 * 60 * 60 * 1000);

        let ultimaResetFecha;
        if (resetHora === '00:00') {
          ultimaResetFecha = hoy;
        } else { // 12:00
          const mediodiaHoy = new Date(hoy.getTime() + 12 * 60 * 60 * 1000);
          if (ahora >= mediodiaHoy) {
            ultimaResetFecha = mediodiaHoy;
          } else {
            const mediodiaAyer = new Date(ayer.getTime() + 12 * 60 * 60 * 1000);
            ultimaResetFecha = mediodiaAyer;
          }
        }

        if (ultimaActualizacion < ultimaResetFecha) {
          console.log(`🔄 Reset automático para PIN ${pinFromUrl} a las ${resetHora}`);
          await statsRef.set({
            ciclosCompletos: 0,
            totalEntradas: 0,
            totalSalidas: 0,
            ultimaActualizacion: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
      } catch (err) {
        console.warn("⚠️ Error en reset automático:", err);
      }
    }

// 🌍 Función para calcular distancia entre dos coordenadas (Fórmula de Haversine)
function calcularDistancia(lat1, lon1, lat2, lon2) {
  const R = 6371000; // Radio de la Tierra en metros
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = 
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
    Math.sin(dLon/2) * Math.sin(dLon/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c; // Distancia en metros
}

// 📍 Función para verificar geolocalización
async function verificarGeolocalizacion() {
  return new Promise(async (resolve, reject) => {
    if (!navigator.geolocation) {
      reject('❌ Tu navegador no soporta geolocalización');
      return;
    }

    try {
      // Obtener coordenadas del usuario
      const position = await new Promise((res, rej) => {
        navigator.geolocation.getCurrentPosition(res, rej, {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        });
      });

      const { latitude, longitude } = position.coords;

      // Obtener datos del PIN de acceso (debe incluir lat, lon y radio en Firestore)
      if (!pinFromUrl) {
        reject('❌ No se pudo identificar la obra');
        return;
      }

      const pinDoc = await db.collection('pines_acceso').doc(pinFromUrl).get();
      if (!pinDoc.exists) {
        reject('❌ PIN de acceso no válido');
        return;
      }

      const pinData = pinDoc.data();
      const obraLat = pinData.latitud;
      const obraLon = pinData.longitud;
      const radioPermitido = pinData.radio_metros || 100; // Default: 100 metros
      const nombreObra = pinData.comentario || 'Obra sin nombre';

      // Actualizar UI con nombre de la obra
      document.getElementById('obra-nombre').textContent = nombreObra;

      if (!obraLat || !obraLon) {
        document.getElementById('ubicacion-mensaje').textContent = '⚠️ Coordenadas no configuradas';
        document.getElementById('ubicacion-mensaje').className = 'error';
        resolve(false);
        return;
      }

      // Calcular distancia
      const distancia = calcularDistancia(latitude, longitude, obraLat, obraLon);

      if (distancia <= radioPermitido) {
        document.getElementById('ubicacion-mensaje').textContent = `✅ Dentro del radio permitido (${Math.round(distancia)}m)`;
        document.getElementById('ubicacion-mensaje').className = 'verificado';
        resolve(true);
      } else {
        document.getElementById('ubicacion-mensaje').textContent = `❌ Fuera de rango (${Math.round(distancia)}m > ${radioPermitido}m)`;
        document.getElementById('ubicacion-mensaje').className = 'error';
        resolve(false);
      }
    } catch (error) {
      console.error('Error en geolocalización:', error);
      document.getElementById('ubicacion-mensaje').textContent = '❌ Error al obtener ubicación';
      document.getElementById('ubicacion-mensaje').className = 'error';
      reject(error.message || 'Error desconocido');
    }
  });
}

    async function registrar(tipo) {
      const pinInput = document.getElementById('pin');
      const pin = pinInput.value.trim();

      if (!pin || !TRABAJADORES[pin]) {
        mostrarMensaje('⚠️ PIN no válido', 'error');
        return;
      }

// 🔒 Validar geolocalización antes de permitir registro
try {
  const ubicacionValida = await verificarGeolocalizacion();
  if (!ubicacionValida) {
    mostrarMensaje('🚫 No puedes registrar desde esta ubicación. Acércate a la obra.', 'error');
    return;
  }
} catch (err) {
  mostrarMensaje('🚫 Error de ubicación: ' + err, 'error');
  return;
}

      try {
        const estado = getEstadoDispositivo();
        const ahora = Date.now();
        const unaHoraMs = 60 * 60 * 1000;

        if (tipo === 'entrada') {
          if (estado.pinEntrada && (ahora - estado.timestamp) < unaHoraMs) {
            const minutosRestantes = Math.ceil((unaHoraMs - (ahora - estado.timestamp)) / 60000);
            mostrarMensaje(`❌ Tienes una entrada abierta (PIN ${estado.pinEntrada}). Espera ${minutosRestantes} minuto(s).`, 'error');
            return;
          }
        }

        if (tipo === 'salida') {
          if (estado.pinEntrada && (ahora - estado.timestamp) < unaHoraMs) {
            if (pin !== estado.pinEntrada) {
              mostrarMensaje(`❌ Solo puedes registrar SALIDA para el PIN ${estado.pinEntrada} (entrada activa).`, 'error');
              return;
            }
          } else {
            const ultimoTipo = await obtenerUltimoTipo(pin);
            if (ultimoTipo !== 'entrada') {
              mostrarMensaje('❌ No hay una entrada previa para este PIN.', 'error');
              return;
            }
          }
        }

        if (tipo === 'entrada') {
          const ultimoTipo = await obtenerUltimoTipo(pin);
          if (ultimoTipo === 'entrada') {
            mostrarMensaje('❌ Ya existe una entrada sin salida. Contacta al administrador.', 'error');
            return;
          }
        }

        // ✅ EJECUTAR VERIFICACIÓN DE RESET ANTES DE REGISTRAR
        await verificarYResetAutomatico();

        // ✅ OBTENER COMENTARIO DEL PIN DE ACCESO
        let comentarioObra = '';
        try {
          if (pinFromUrl) {
            const pinDoc = await db.collection('pines_acceso').doc(pinFromUrl).get();
            if (pinDoc.exists) {
              comentarioObra = pinDoc.data().comentario || '';
            }
          }
        } catch (err) {
          console.warn("No se pudo obtener el comentario del PIN:", err);
        }

        // Guardar registro con comentario
        await db.collection('registros_publicos').add({
          trabajadorId: pin,
          nombre: TRABAJADORES[pin],
          tipo: tipo,
          fechaHora: firebase.firestore.FieldValue.serverTimestamp(),
          comentario: comentarioObra // ← ¡NUEVO CAMPO!
        });

        // Actualizar estado local
        if (tipo === 'entrada') {
          setEstadoDispositivo({
            pinEntrada: pin,
            timestamp: Date.now()
          });
        } else if (tipo === 'salida') {
          if (estado.pinEntrada === pin) {
            limpiarBloqueo();
          }
        }

        // ✅ ACTUALIZAR ESTADÍSTICAS
        if (pinFromUrl) {
          const statsRef = db.collection('estadisticas_pins').doc(pinFromUrl);
          
          // Leer datos actuales
          const statsSnap = await statsRef.get();
          let ciclosCompletos = 0;
          let totalEntradas = 0;
          let totalSalidas = 0;
          
          if (statsSnap.exists) {
            const data = statsSnap.data();
            ciclosCompletos = data.ciclosCompletos || 0;
            totalEntradas = data.totalEntradas || 0;
            totalSalidas = data.totalSalidas || 0;
          }
          
          // Actualizar contadores
          if (tipo === 'entrada') {
            totalEntradas++;
          } else if (tipo === 'salida') {
            totalSalidas++;
            ciclosCompletos++; // Cada salida válida = 1 ciclo
          }
          
          // Guardar datos
          await statsRef.set({
            ciclosCompletos: ciclosCompletos,
            totalEntradas: totalEntradas,
            totalSalidas: totalSalidas,
            ultimaActualizacion: firebase.firestore.FieldValue.serverTimestamp()
          });
        }

        actualizarEstadoBotones();
        mostrarMensaje(`✅ ${tipo === 'entrada' ? 'Entrada' : 'Salida'} registrada para ${TRABAJADORES[pin]}`, 'success');
        
        // Redirección automática
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 3000);

        pinInput.value = '';
      } catch (err) {
        console.error("Error al registrar:", err);
        if (err.code === 'failed-precondition') {
          mostrarMensaje('❌ Error: falta índice en Firestore.', 'error');
        } else {
          mostrarMensaje('❌ Error: ' + (err.message || 'conexión'), 'error');
        }
      }
    }

    document.getElementById('pin').addEventListener('input', () => {
      setTimeout(actualizarEstadoBotones, 100);
    });

    // Inicializar
    verificarPINAcceso().then(permitido => {
      if (permitido) {
        cargarTrabajadores();
        setInterval(() => {
          actualizarEstadoBotones();
        }, 60000);
      }
    });

    document.getElementById('entrada').addEventListener('click', () => registrar('entrada'));
    document.getElementById('salida').addEventListener('click', () => registrar('salida'));

    // Fallback para logo
    document.getElementById('logo').onerror = function() {
      this.classList.add('fallback');
      this.textContent = 'LC';
    };
  </script>
