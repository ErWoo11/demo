<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notificaciones - DEMO</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      background: url('fondo.png') repeat;
      background-size: 300px;
      background-color: #f5f5f5;
      padding: 20px;
      min-height: 100vh;
    }
    
    .main-content {
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }
    
    /* Logo */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo {
      width: 100%;
      max-width: 300 px;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.15);
      margin: 0 auto 40px;
      display: block;
    }

    #logo.fallback {
      background: #2c3e50;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: bold;
      border-radius: 16px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.15);
      margin: 0 auto 40px;
    }

    /* Efecto al pasar el ratón */
    .logo:hover {
      transform: scale(1.03) translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    h1, h2 {
      color: #2c3e50;
      margin-bottom: 20px;
    }
    
    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
      box-sizing: border-box;
    }
    
    button {
      background: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
    
    th {
      background: #f2f2f2;
    }
    
    .hidden {
      display: none;
    }
    
    .msg {
      padding: 8px;
      margin: 10px 0;
      border-radius: 4px;
    }
    
    .success {
      background: #d4edda;
      color: #155724;
    }
    
    .error {
      background: #f8d7da;
      color: #721c24;
    }
  </style>

<!-- ✅ Sistema de actualización automática -->
<script>
  // Añadir timestamp a todas las URLs de scripts y estilos
  document.addEventListener('DOMContentLoaded', () => {
    const timestamp = Date.now();
    
    // Actualizar scripts
    document.querySelectorAll('script[src]').forEach(script => {
      if (!script.src.includes('?v=')) {
        script.src = script.src + '?v=' + timestamp;
      }
    });
    
    // Actualizar estilos (si tienes CSS externos)
    document.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
      if (!link.href.includes('?v=')) {
        link.href = link.href + '?v=' + timestamp;
      }
    });
  });
</script>

</head>
<body>
  <div class="main-content">

  <!-- Logo (clic para volver a inicio) -->
   <div class="header">
    <a href="index.html">
     <img src="logo.png" alt="Logo de la Empresa" class="logo" id="logo">
    </a>
   </div>
    
    <!-- Contenido -->
    <div class="container">
      <h2>🔔 Mis Notificaciones</h2>
      
      <!-- Formulario de PIN -->
      <div id="form-pin">
        <p>Introduce tu PIN para ver tus notificaciones:</p>
        <input type="text" id="pin-notificaciones" placeholder="PIN (4 dígitos)" maxlength="4" />
        <button id="btn-ver-notificaciones">🔍 Ver notificaciones</button>
        <div id="msg-notificaciones"></div>
      </div>
      
      <!-- Lista de notificaciones -->
      <div id="lista-notificaciones" class="hidden">
        <h3>Tus notificaciones</h3>
        <table>
          <thead>
            <tr>
              <th>Título</th>
              <th>Mensaje</th>
              <th>Fecha/Hora</th>
            </tr>
          </thead>
          <tbody id="cuerpo-notificaciones">
            <tr><td colspan="3">Cargando...</td></tr>
          </tbody>
        </table>
        <button id="btn-volver" style="margin-top: 20px; background: #9b59b6;">Volver a inicio</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  
  <script>
    // Inicializar Firebase
    const firebaseConfig = {
    apiKey: "AIzaSyAhp3v6jwxN8nrachWt3m879Ir8_midnbs",
    authDomain: "gen-lang-client-0317267897.firebaseapp.com",
    projectId: "gen-lang-client-0317267897",
    storageBucket: "gen-lang-client-0317267897.firebasestorage.app",
    messagingSenderId: "952141780593",
    appId: "1:952141780593:web:72c0f7aada03741958edd0"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // Formatear fecha
    function formatearFecha(fecha) {
      if (fecha?.toDate) fecha = fecha.toDate();
      return new Intl.DateTimeFormat('es-ES', {
        year: '2-digit',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      }).format(fecha);
    }
    
// ✅ Verificar PIN y cargar notificaciones (con filtrado por obra inteligente)
// ✅ Verificar PIN y cargar notificaciones (con filtrado por obra usando trabajadorId)
async function verNotificaciones() {
  const pin = document.getElementById('pin-notificaciones').value.trim();
  const msgDiv = document.getElementById('msg-notificaciones');
  
  if (!pin || pin.length !== 4 || isNaN(pin)) {
    msgDiv.textContent = '⚠️ Introduce un PIN válido de 4 dígitos';
    msgDiv.className = 'msg error';
    return;
  }
  
  try {
    msgDiv.textContent = '🔍 Verificando PIN...';
    msgDiv.className = 'msg success';
    
    // Verificar si el PIN existe en trabajadores
    const trabajadorSnapshot = await db.collection('trabajadores')
      .where('pin', '==', pin)
      .limit(1)
      .get();
      
    if (trabajadorSnapshot.empty) {
      throw new Error('PIN no válido');
    }
    
    // ✅ Obtener las obras donde este trabajador ha registrado actividad
    // Buscar por trabajadorId == pin
    const registrosSnapshot = await db.collection('registros_publicos')
      .where('trabajadorId', '==', pin)
      .get();
    
    const obrasTrabajador = new Set();
    registrosSnapshot.forEach(doc => {
      const data = doc.data();
      if (data.comentario && data.comentario.trim() !== '') {
        obrasTrabajador.add(data.comentario.trim());
      }
    });
    
    // Obtener notificaciones
    const notificacionesSnapshot = await db.collection('notificaciones_internas')
      .orderBy('fechaEnvio', 'desc')
      .get();
    
    const notificacionesParaEstePin = [];
    const updatesPendientes = [];
    
    notificacionesSnapshot.forEach(doc => {
      const n = doc.data();
      let esParaEstePin = false;
      
      if (n.tipoDestino === 'todos') {
        esParaEstePin = true;
      } else if (n.tipoDestino === 'individual' && n.destinatarios.includes(pin)) {
        esParaEstePin = true;
      } else if (n.tipoDestino === 'multiples' && n.destinatarios.includes(pin)) {
        esParaEstePin = true;
      } else if (n.tipoDestino === 'obra' && n.destinatarios.length > 0) {
        // ✅ Verificar si el trabajador ha trabajado en esta obra específica
        const obraNotificacion = n.destinatarios[0];
        if (obrasTrabajador.has(obraNotificacion)) {
          esParaEstePin = true;
        }
      }
      
      const yaLeida = n.leidos?.[pin] === true;
      
      if (esParaEstePin && !yaLeida) {
        notificacionesParaEstePin.push({ id: doc.id, ...n });
        updatesPendientes.push({
          ref: doc.ref,
          leidos: { ...(n.leidos || {}), [pin]: true }
        });
      }
    });
    
    const tbody = document.getElementById('cuerpo-notificaciones');
    
    if (notificacionesParaEstePin.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3">No tienes notificaciones disponibles</td></tr>';
    } else {
      let filas = '';
      notificacionesParaEstePin.slice(0, 10).forEach(n => {
        const fecha = n.fechaEnvio?.toDate ? formatearFecha(n.fechaEnvio) : 'Sin fecha';
        filas += `
          <tr>
            <td><strong>${n.titulo}</strong></td>
            <td>${n.mensaje}</td>
            <td>${fecha}</td>
          </tr>
        `;
      });
      tbody.innerHTML = filas;
      
      // Marcar como leídas
      if (updatesPendientes.length > 0) {
        const batch = db.batch();
        updatesPendientes.forEach(update => {
          batch.update(update.ref, { leidos: update.leidos });
        });
        await batch.commit();
      }
    }
    
    document.getElementById('form-pin').classList.add('hidden');
    document.getElementById('lista-notificaciones').classList.remove('hidden');
    
  } catch (err) {
    console.error("Error al cargar notificaciones:", err);
    msgDiv.textContent = '❌ ' + (err.message === 'PIN no válido' ? 'PIN no válido' : 'Error al cargar notificaciones');
    msgDiv.className = 'msg error';
  }
}
    
    // Eventos
    document.getElementById('btn-ver-notificaciones').addEventListener('click', verNotificaciones);
    document.getElementById('btn-volver').addEventListener('click', () => {
      // ✅ Redirigir a index.html y mantener sesión
      window.location.href = 'index.html';
    });
    
    // Permitir Enter en el campo de PIN
    document.getElementById('pin-notificaciones').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        verNotificaciones();
      }
    });
    
    // Fallback para logo
    document.getElementById('logo').onerror = function() {
      this.classList.add('fallback');
      this.textContent = 'LC';
    };
  </script>
</body>
</html>
